name: SyncMate
options:
  bundleIdPrefix: com.syncmate
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: SyncMate
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES

targets:
  SyncMate:
    type: application
    platform: macOS
    sources:
      - path: SyncMate
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: SyncMate/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.syncmate.app
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: SyncMate/SyncMate.entitlements
    entitlements:
      path: SyncMate/SyncMate.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.files.user-selected.read-write: true